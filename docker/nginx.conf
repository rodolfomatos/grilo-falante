worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    upstream visualizer_backend {
        server visualizer:8000;
    }

    upstream openwebui_backend {
        server openwebui:8080;
    }

    upstream api_backend {
        server api:8000;
    }

    upstream grilo_api {
        server api:8000;
    }

    server {
    if ($host = llm.ilab.uporto.pt) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name llm.ilab.uporto.pt;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name llm.ilab.uporto.pt;

    ssl_certificate /etc/letsencrypt/live/llm.ilab.porto.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.ilab.porto.pt/privkey.pem;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "nginx healthy\n";
        add_header Content-Type text/plain;
    }

    location ~ ^/(ws/)?socket.io/ {
        proxy_pass http://openwebui_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # OpenWebUI API - deve vir primeiro (mais específico)
    location /api/ {
        proxy_pass http://openwebui_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 200M;
    }

    # Grilo API em /grilo/api/ (para evitar conflitos com OpenWebUI)
    location /grilo/api/ {
        allow 193.137.29.105;
        allow 193.137.29.72;
        allow 193.137.54.7;
        allow 127.0.0.0/8;
        allow 172.18.0.0/16;
        deny all;

        rewrite ^/grilo/api/(.*)$ $1 break;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 200M;
    }

    # Grilo API root - redirect para health ou docs
    location /grilo {
        allow 193.137.54.7;
        allow 193.137.54.6;
        allow 193.137.29.105;
        allow 127.0.0.0/8;
        allow 172.18.0.0/16;
        deny all;

        rewrite ^/grilo(/.*)$ $1 break;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 200M;
    }

    location /visualizer {
        allow 193.137.54.7;
        allow 193.137.54.6;
        allow 193.137.29.105;
        allow 127.0.0.0/8;
        allow 172.18.0.0/16;
        deny all;

        proxy_pass http://visualizer_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /hub {
        allow 193.137.54.7;
        allow 193.137.54.6;
        allow 193.137.29.105;
        allow 127.0.0.0/8;
        allow 172.18.0.0/16;
        deny all;

        proxy_pass http://visualizer_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        allow 193.137.54.7;
        allow 193.137.54.6;
        allow 193.137.29.105;
        allow 193.137.29.72;
        allow 127.0.0.0/8;
        allow 172.18.0.0/16;
        deny all;

        if ($request_uri = '/') {
            return 302 /?web-search=true;
        }

        proxy_pass http://openwebui_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 200M;
    }
}
}
