services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: grilo_falante
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/grilo-falante/docker/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - /opt/grilo-falante/docker/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bitnet:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bitnet
    ports:
      - "8003:8002"
    volumes:
      - bitnet_models:/models
    environment:
      BITNET_MODEL: ${BITNET_MODEL:-BitNet-b1.58-2B-4T}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_started
      visualizer:
        condition: service_started
    restart: unless-stopped
    networks:
      - default

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/grilo_falante
      API_TOKEN: ${API_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LLM_PROVIDER: ${LLM_PROVIDER:-bitnet}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      IAEDU_API_KEY: ${IAEDU_API_KEY:-}
      OPENWEBUI_BASE_URL: http://openwebui:8080
      OPENWEBUI_API_KEY: ${OPENWEBUI_API_KEY:-}
      BITNET_BASE_URL: http://bitnet:8002
      BITNET_MODEL: ${BITNET_MODEL:-BitNet-b1.58-2B-4T}
    ports:
      - "8010:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      bitnet:
        condition: service_started
    command: uvicorn grilo_falante.backend.api.main:app --host 0.0.0.0 --port 8000

  mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/grilo_falante
      API_TOKEN: ${API_TOKEN:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-iaedu}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      BITNET_BASE_URL: http://bitnet:8002
      BITNET_MODEL: ${BITNET_MODEL:-BitNet-b1.58-2B-4T}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      bitnet:
        condition: service_started
    command: python -m grilo_falante.backend.mcp.server
    stdin_open: true
    tty: true

  lake:
    image: filebrowser/filebrowser:latest
    ports:
      - "8083:8082"
    volumes:
      - lake_data:/srv
      - ./lake:/srv/root
    environment:
      FB_BASEURL: /lake
      FB_PORT: 8082

  iaedu-adapter:
    image: node:20-alpine
    ports:
      - "4010:4000"
    environment:
      IAEDU_API_KEY: ${IAEDU_API_KEY:-}
    volumes:
      - ./iaedu-adapter:/app
    command: >
      sh -c "npm install && node /app/adapter-server.mjs"
    depends_on:
      - api

  visualizer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/grilo_falante
    ports:
      - "8005:8000"
    depends_on:
      db:
        condition: service_healthy
    command: python -c "from visualizer_server import app; import uvicorn; uvicorn.run(app, host='0.0.0.0', port=8000)"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  openwebui_data:
  lake_data:
  bitnet_models:
  nginx_logs:
