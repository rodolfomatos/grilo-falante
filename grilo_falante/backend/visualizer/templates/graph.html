{% extends "base.html" %}

{% block title %}Knowledge Graph - Grilo Falante Visualizer{% endblock %}

{% block content %}
<div class="tabs">
    <a href="/visualizer/" class="tab">Overview</a>
    <a href="/visualizer/ilhas" class="tab">Ilhas</a>
    <a href="/visualizer/claims" class="tab">Claims</a>
    <a href="/visualizer/graph" class="tab active">Graph</a>
</div>

<div class="article">
    <div class="article-header">
        <h1 class="article-title">Knowledge Graph</h1>
    </div>
    <div class="article-content">
        <div id="graph-data" 
             data-nodes="{{ nodes|tojson }}" 
             data-links="{{ edges|tojson }}">
            <div class="graph-container">
                <svg id="graph-svg"></svg>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const graphContainer = document.getElementById('graph-data');
    const nodesData = {{ nodes|tojson }};
    const linksData = {{ edges|tojson }};
    
    if (nodesData.length === 0) {
        graphContainer.innerHTML = '<p><em>No graph data available.</em></p>';
        return;
    }
    
    const container = graphContainer.querySelector('.graph-container');
    const width = container.clientWidth || 800;
    const height = container.clientHeight || 600;
    
    const svg = d3.select('#graph-svg')
        .attr('viewBox', [0, 0, width, height]);
    
    const colorScale = {
        'M1': '#2e7d32',
        'M2': '#558b2f', 
        'M3': '#f9a825',
        'M4': '#e53935',
        'claim': '#36c'
    };
    
    const simulation = d3.forceSimulation(nodesData)
        .force('link', d3.forceLink(linksData).id(d => d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2));
    
    const link = svg.append('g')
        .selectAll('line')
        .data(linksData)
        .join('line')
        .attr('class', 'link')
        .attr('stroke', '#999')
        .attr('stroke-opacity', 0.6);
    
    const node = svg.append('g')
        .selectAll('g')
        .data(nodesData)
        .join('g')
        .attr('class', 'node')
        .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));
    
    node.append('circle')
        .attr('r', 8)
        .attr('fill', d => colorScale[d.gmif_level] || colorScale.claim);
    
    node.append('text')
        .attr('dx', 12)
        .attr('dy', '.35em')
        .text(d => d.label ? d.label.substring(0, 20) : d.id);
    
    simulation.on('tick', () => {
        link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
        
        node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
    
    function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
    }
    
    function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
    }
    
    function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
    }
});
</script>
{% endblock %}
