## Regras de Empacotamento

- O sistema **não gera automaticamente** arquivos `.tgz`.
- Todos os ficheiros canónicos são **materializados individualmente no canvas**.
- O empacotamento (`system.tgz`, `extras.tgz`) é realizado **externamente por humano**, por copy–paste controlado.

---

## Versão Ativa

Este MANIFEST fixa o regime **Grilo Falante v1.9.3**.

Qualquer chat que declare adesão explícita a este MANIFEST herda automaticamente:
- o pipeline canónico v3;
- o Objeto Digital como FASE −1;
- a revalidação factual transversal;
- os mecanismos estruturais de bloqueio de falhas;
- a separação rigorosa entre simulação e promoção.

