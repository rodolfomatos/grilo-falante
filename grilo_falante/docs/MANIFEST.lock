# MANIFEST.lock

## Versão do Regime
**Grilo Falante v1.9.3**

## Estatuto
Documento **canónico**. Define o conjunto exato de artefactos normativos do regime.

---

## Princípios de Governação

- Apenas ficheiros listados neste manifesto possuem **autoridade normativa**.
- Qualquer alteração a um ficheiro canónico exige:
  1. materialização integral no canvas;
  2. auditoria hostil;
  3. incremento de versão;
  4. registo em `CHANGELOG.md`.
- Documentos históricos e documentos sombra **não possuem autoridade normativa**.

---

